      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="1" y2="1">
